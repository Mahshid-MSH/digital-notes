name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # ✅ Fixed: v6 → v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4         # ✅ Fixed: v6 → v4
        with:
          node-version: 22                  # ✅ Stable LTS, not 24

      # Caches temporarily disabled to rule out corruption.
      # Re-enable later with a fresh key (e.g. add -v2) when stable.
      # - name: Cache dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.npm
      #     key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      #     restore-keys: |
      #       ${{ runner.os }}-node-
      #
      # - name: Cache Quartz plugins
      #   uses: actions/cache@v4
      #   with:
      #     path: .quartz/plugins
      #     key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
      #     restore-keys: |
      #       ${{ runner.os }}-plugins-

      - name: Install Dependencies
        run: npm ci --loglevel verbose      # ✅ Verbose logging + memory increase
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Build Quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Upload npm debug log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-log
          path: /home/runner/.npm/_logs/*-debug-0.log

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
